<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>GPA Calculator jQuery + Bootstrap</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<link rel="stylesheet" href="style.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script src="script.js" defer></script>
</head>

<body class="container mt-5">

<h1 class="mb-4">GPA Calculator</h1>

<div id="result"></div>

<form id="gpaForm">

<div id="courses">

<div class="course-row form-row mb-2">

<input type="text" name="course[]" class="form-control col" placeholder="Course" required>

<input type="number" name="credits[]" class="form-control col-2" min="1" placeholder="Credits" required>

<select name="grade[]" class="form-control col-2">
<option value="4">A</option>
<option value="3">B</option>
<option value="2">C</option>
<option value="1">D</option>
<option value="0">F</option>
</select>

</div>

</div>

<button type="button" id="addCourse" class="btn btn-secondary mb-3">+ Add Course</button>

<br>

<button type="submit" class="btn btn-primary">Calculate GPA</button>

</form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>GPA Calculator Step 4</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="script.js" defer></script>
</head>

<body class="container mt-5">

<h1 class="mb-4">GPA Calculator</h1>

<div id="result"></div>

<form id="gpaForm">

<input type="text" name="student" class="form-control mb-2"
placeholder="Student Name" required>

<input type="text" name="semester" class="form-control mb-2"
placeholder="Semester" required>

<div id="courses">

<div class="course-row form-row mb-2">

<input type="text" name="course[]" class="form-control col"
placeholder="Course" required>

<input type="number" name="credits[]" class="form-control col-2"
placeholder="Credits" min="1" required>

<select name="grade[]" class="form-control col-2">
<option value="4">A</option>
<option value="3">B</option>
<option value="2">C</option>
<option value="1">D</option>
<option value="0">F</option>
</select>

</div>

</div>

<button type="button" id="addCourse" class="btn btn-secondary mb-3">
+ Add Course
</button>

<br>

<button type="submit" class="btn btn-primary">
Calculate GPA
</button>

</form>

<div class="progress mt-4">
<div id="bar" class="progress-bar" style="width:0%">0</div>
</div>

<a href="export.php" class="btn btn-success mt-3">
Download CSV
</a>

</body>
</html>
